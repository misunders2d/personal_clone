services:
  personal-clone:
    build: .
    container_name: personal-clone-agent
    stdin_open: true
    tty: true
    ports:
      - "8081:8080"
    volumes:
      - ./data:/code/data
      - ./.git:/code/.git
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/personal_clone.db
      - DOTENV_PATH=/code/data/.env
    restart: unless-stopped
