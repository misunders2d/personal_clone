services:
  personal-clone:
    build: .
    container_name: personal-clone-agent
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    volumes:
      - ./data:/code/data
      - ./.git:/code/.git
    environment:
      - DOTENV_PATH=/code/data/.env
      - HOST=0.0.0.0
      - PORT=8080
    restart: unless-stopped
